name: Daily Qiita Notification

on:
  schedule:
    # Wednesday 08:00 JST (Tuesday 23:00 UTC)
    - cron: "0 23 * * 2"
    # Saturday 08:00 JST (Friday 23:00 UTC)
    - cron: "0 23 * * 5"
    # Temporary test trigger: 2026-05-19 10:07 JST (01:07 UTC)
    - cron: "7 1 19 5 *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pipeline
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}
          QIITA_API_TOKEN: ${{ secrets.QIITA_API_TOKEN }}
          GHUB_MODELS_API_KEY: ${{ secrets.GHUB_MODELS_API_KEY }}
          QIITA_LOOKBACK_DAYS: ${{ vars.QIITA_LOOKBACK_DAYS || '7' }}
          PIPELINE_UNTIL_STEP: "4"
          REQUIRE_LLM_SUCCESS: "true"
          GITHUB_MODELS_MODEL: "gpt-4o-mini"
          DRY_RUN: "false"
        run: python run_pipeline.py
